<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      overflow-y: auto;
      font-size: 13px;
    }

    .header {
      background: linear-gradient(135deg, #10b981, #059669);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: move;
      user-select: none;
    }
    .header-left { display: flex; align-items: center; gap: 8px; }
    .header h1 { font-size: 16px; color: #fff; }
    .header .emoji { font-size: 20px; }
    .close-btn {
      background: none; border: none; color: rgba(255,255,255,0.7);
      font-size: 20px; cursor: pointer; padding: 0 4px;
    }
    .close-btn:hover { color: #fff; }

    /* 탭 네비게이션 */
    .tab-nav {
      display: flex;
      border-bottom: 2px solid #2a2a4a;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      background: transparent;
      color: #6666aa;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: #a5b4fc;
      border-bottom-color: #667eea;
      background: rgba(102,126,234,0.1);
    }
    .tab-btn:hover { color: #a5b4fc; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .controls {
      padding: 10px 12px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid #2a2a4a;
    }

    .btn {
      flex: 1;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-review {
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      color: #fff;
    }
    .btn-review:hover { opacity: 0.9; }
    .btn-review:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: #2a2a4a;
      color: #b0b0d0;
      border: 1px solid #3a3a5a;
    }
    .btn-secondary:hover { background: #3a3a5a; }

    .status {
      padding: 8px 12px;
      font-size: 11px;
      color: #8888aa;
      border-bottom: 1px solid #2a2a4a;
    }
    .status .step { margin: 2px 0; }
    .status .step.active { color: #667eea; }
    .status .step.done { color: #4ade80; }
    .status .step.error { color: #f87171; }

    .token-info {
      padding: 8px 12px;
      background: #16162a;
      border-bottom: 1px solid #2a2a4a;
      font-size: 10px;
      color: #6666aa;
      display: none;
    }
    .token-info.show { display: flex; gap: 12px; flex-wrap: wrap; }
    .token-info span { white-space: nowrap; }
    .token-info .cost { color: #4ade80; font-weight: 600; }

    .result {
      padding: 12px;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .result h1, .result h2, .result h3 { color: #a5b4fc; margin: 10px 0 4px; }
    .result h1 { font-size: 16px; }
    .result h2 { font-size: 14px; }
    .result h3 { font-size: 13px; }
    .result strong { color: #c4b5fd; }

    .custom-prompt {
      padding: 6px 12px;
      border-bottom: 1px solid #2a2a4a;
    }
    .custom-prompt textarea {
      width: 100%;
      height: 50px;
      background: #16162a;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 6px 8px;
      font-size: 12px;
      resize: vertical;
    }
    .custom-prompt textarea:focus { outline: none; border-color: #667eea; }

    .mode-toggle {
      padding: 6px 12px;
      display: flex;
      gap: 6px;
      border-bottom: 1px solid #2a2a4a;
    }
    .mode-btn {
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid #3a3a5a;
      background: transparent;
      color: #8888aa;
      font-size: 11px;
      cursor: pointer;
    }
    .mode-btn.active {
      background: #10b981;
      color: #fff;
      border-color: #10b981;
    }

    .loading-dots::after {
      content: '';
      animation: dots 1.5s infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }

    /* 프로그레스 바 */
    .progress-bar {
      margin: 8px 12px;
      height: 6px;
      background: #2a2a4a;
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    .progress-bar.show { display: block; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }

    /* 리뷰 안내 */
    .review-info {
      padding: 8px 12px;
      font-size: 11px;
      color: #8888aa;
      border-bottom: 1px solid #2a2a4a;
      line-height: 1.5;
    }
    .review-info .supported { color: #4ade80; }
    .review-info .unsupported { color: #f87171; }
  </style>
</head>
<body>
  <div class="header" id="dragHandle">
    <div class="header-left">
      <span class="emoji">🖱️</span>
      <h1>딸깍분석 LITE</h1>
    </div>
    <button class="close-btn" id="closeBtn">✕</button>
  </div>

  <!-- 탭 네비게이션 -->
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="analyze">상품 분석</button>
    <button class="tab-btn" data-tab="review">리뷰 분석기</button>
  </div>

  <!-- 탭 1: 상품 분석 (기존) -->
  <div class="tab-content active" id="tab-analyze">
    <div class="mode-toggle">
      <button class="mode-btn" data-mode="off">기본 (DOM만)</button>
      <button class="mode-btn active" data-mode="turbo">터보 (검색+)</button>
    </div>
    <div class="custom-prompt">
      <textarea id="userPrompt" placeholder="분석 요청을 입력하세요 (비우면 기본 분석)">이 사이트의 제품을 아주 상세하게 강점, 단점, 스펙 등 분석해서 알려줘</textarea>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="analyzeBtn">🖱️ 딸깍 분석하기</button>
      <button class="btn btn-secondary" id="copyBtn" style="flex:0.4" disabled>복사</button>
    </div>
    <div class="status" id="status"></div>
    <div class="token-info" id="tokenInfo"></div>
    <div class="result" id="result"></div>
  </div>

  <!-- 탭 2: 리뷰 분석기 -->
  <div class="tab-content" id="tab-review">
    <div class="review-info" id="reviewInfo">
      현재 페이지를 감지 중...
    </div>
    <div class="controls">
      <button class="btn btn-review" id="reviewBtn" disabled>리뷰 수집 & 분석</button>
      <button class="btn btn-secondary" id="reviewCopyBtn" style="flex:0.4" disabled>복사</button>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="status" id="reviewStatus"></div>
    <div class="token-info" id="reviewTokenInfo"></div>
    <div class="result" id="reviewResult"></div>
  </div>

  <script src="config.js"></script>
  <script src="panel.js"></script>
  <script src="review.js"></script>
</body>
</html>
